name: Nike Price Scraper

on:
  schedule:
    # Se ejecuta cada 6 horas (puedes ajustarlo)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña "Actions"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install selenium beautifulsoup4 requests webdriver-manager

      - name: Instalar Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Ejecutar script de extracción
        env:
          # Aquí conectamos los Secrets de GitHub con tu código
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tu_script.py # <--- ASEGÚRATE DE QUE SE LLAME ASÍ O CAMBIA EL NOMBRE
